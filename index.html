<!DOCTYPE html>
<html>
<head>
    <title>Swastik Wood Works</title>
<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>
    <iframe id="catalogFrame"></iframe>
<script>
    fetch('catalog.txt')
        .then(response => response.text())
        .then(url => {
            document.getElementById('catalogFrame').src = url.trim();
        });
</script>
</body>
</html>
